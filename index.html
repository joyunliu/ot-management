<script>
// Web Crypto JWT - works natively on iOS Safari without external libraries
async function signJWT(header, payload, pemKey) {
  const b64u = s => btoa(s).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const b64uEncode = obj => b64u(JSON.stringify(obj));
  
  // Parse PEM key
  const pemContents = pemKey
    .replace('-----BEGIN PRIVATE KEY-----','')
    .replace('-----END PRIVATE KEY-----','')
    .replace(/\s/g,'');
  const binaryDer = Uint8Array.from(atob(pemContents), c => c.charCodeAt(0));
  
  const cryptoKey = await crypto.subtle.importKey(
    'pkcs8', binaryDer.buffer,
    { name: 'RSASSA-PKCS1-v1_5', hash: 'SHA-256' },
    false, ['sign']
  );
  
  const signingInput = b64uEncode(header) + '.' + b64uEncode(payload);
  const encoder = new TextEncoder();
  const signature = await crypto.subtle.sign(
    'RSASSA-PKCS1-v1_5', cryptoKey, encoder.encode(signingInput)
  );
  
  const b64uSig = btoa(String.fromCharCode(...new Uint8Array(signature)))
    .replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  
  return signingInput + '.' + b64uSig;
}

// JWT AUTH
// ══════════════════════════════════════════════════
async function getAccessToken(){
  if(accessToken&&Date.now()<tokenExpiry)return accessToken;
  const now=Math.floor(Date.now()/1000);
  const header={alg:'RS256',typ:'JWT'};
  const payload={iss:SA_EMAIL,scope:'https://www.googleapis.com/auth/spreadsheets',aud:'https://oauth2.googleapis.com/token',exp:now+3600,iat:now};
  const jwt=await signJWT(header,payload,SA_KEY);
  const res=await fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`});
  const d=await res.json();
  if(!d.access_token)throw new Error('Token error: '+JSON.stringify(d));
  accessToken=d.access_token;tokenExpiry=Date.now()+3500*1000;return accessToken;
}

async function sheetGet(range){const t=await getAccessToken();const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}`,{headers:{Authorization:`Bearer ${t}`}});return(await r.json()).values||[];}
async function sheetSet(range,values){const t=await getAccessToken();await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW`,{method:'PUT',headers:{Authorization:`Bearer ${t}`,'Content-Type':'application/json'},body:JSON.stringify({range,majorDimension:'ROWS',values})});}
async function sheetAppend(range,values){const t=await getAccessToken();await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,{method:'POST',headers:{Authorization:`Bearer ${t}`,'Content-Type':'application/json'},body:JSON.stringify({range,majorDimension:'ROWS',values})});}
async function sheetClear(range){const t=await getAccessToken();await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}:clear`,{method:'POST',headers:{Authorization:`Bearer ${t}`}});}

    {name:'紀錄',h:['id','caseId','date','attendance','soapS','soapO','soapA','soapP','activities','parentNote','therapist']},
    {name:'評估',h:['id','caseId','tool','date','scores','percentiles','subtestResults','notes','recommendations']},
    {name:'里程碑',h:['id','caseId','date','ageGroup','gross','fine','cognitive','social','selfcare','notes']},
    {name:'設定',h:['key','value']},
  ];
  for(const s of sheets){const rows=await sheetGet(`${s.name}!A1:Z1`);if(!rows.length)await sheetSet(`${s.name}!A1`,[s.h]);}
}

function newId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function typeLabel(type,groupSize){return type==='group'?`👥團體${groupSize}人`:type==='assess_init'?'🔬初評':type==='assess_follow'?'🔬追蹤評估':'👤個別';}
function toast(msg,dur=2200){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
function age(dob){if(!dob)return'–';const d=new Date(dob),n=new Date();let y=n.getFullYear()-d.getFullYear(),m=n.getMonth()-d.getMonth();if(n.getDate()<d.getDate())m--;if(m<0){y--;m+=12;}return y+'歲'+m+'個月';}
function ageMonths(dob){if(!dob)return 0;const d=new Date(dob),n=new Date();return(n.getFullYear()-d.getFullYear())*12+(n.getMonth()-d.getMonth());}
function caseColor(id){return DB.cases.find(x=>x.id===id)?.color||COLORS[0];}
function caseName(id){return DB.cases.find(x=>x.id===id)?.name||'–';}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function firstDay(y,m){return new Date(y,m,1).getDay();}

async function syncAll(){
  const btn=document.getElementById('syncBtn');
  btn.style.animation='spin .8s linear infinite';
  try{await loadAll();render();toast('✅ 已同步最新資料');}
  catch(e){toast('❌ 同步失敗，請檢查網路');}
  finally{btn.style.animation='';btn.textContent='⟳ 同步';}
}

function getAgeGroup(dob){
  const m=ageMonths(dob);
  if(m<12)return'0-12m';if(m<24)return'1-2y';if(m<36)return'2-3y';
  if(m<48)return'3-4y';if(m<72)return'4-6y';return'6-12y';
}

function calcFee(type,groupSize,timeSlot){
  const s=DB.settings;
  if(type==='assess_init')   return +s.fee_assess_init||3000;
  if(type==='assess_follow') return +s.fee_assess_follow||2000;
  if(type==='individual'){return timeSlot==='weekend'?+s.fee_individual_weekend:+s.fee_individual_weekday;}
  if(groupSize<=2){return timeSlot==='weekend'?+s.fee_group2_weekend:+s.fee_group2_weekday;}
  return timeSlot==='weekend'?+s.fee_group3_weekend:+s.fee_group3_weekday;
}

function renderCases(){
  return`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">

  </div>

  <div class="case-grid" id="caseGrid">${renderCaseCards(DB.cases)}</div>`;
}
function renderCaseCards(list){
  if(!list.length)return`<div class="empty" style="grid-column:1/-1"><div class="ei">👤</div>尚無個案</div>`;
  return list.map(c=>`
  <div class="case-card" onclick="selectCase('${c.id}')">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:9px">
      <div class="av" style="width:38px;height:38px;background:${c.color};font-size:16px">${c.name[0]||'?'}</div>
      <div><div style="font-weight:700;font-size:14px">${c.name}</div>
      <span class="tag" style="background:${c.status==='active'?'var(--sage-l)':c.status==='pending'?'var(--gold-l)':'var(--border)'};color:${c.status==='active'?'var(--sage-d)':c.status==='pending'?'var(--gold)':'var(--muted)'}">${c.status==='active'?'治療中':c.status==='pending'?'待初評':'暫停'}</span></div>
    </div>
    <div style="font-size:11px;color:var(--navy-l);margin-bottom:2px">🔍 ${c.diagnosis||'–'}</div>
    <div style="font-size:11px;color:var(--muted)">${age(c.dob)}歲 · ${c.sessions}次</div>
  </div>`).join('');
}
function filterCases(q){const g=document.getElementById('caseGrid');if(g)g.innerHTML=renderCaseCards(DB.cases.filter(c=>c.name.includes(q)||c.diagnosis.includes(q)));}
function selectCase(id){currentCase=DB.cases.find(c=>c.id===id);currentCaseTab='info';render();}

// ══════════════════════════════════════════════════
// CALENDAR
// ══════════════════════════════════════════════════
function renderCalendar(){
  const days=daysInMonth(calYear,calMonth),start=firstDay(calYear,calMonth);
  const aMap={};DB.appts.forEach(a=>{if(!aMap[a.date])aMap[a.date]=[];aMap[a.date].push(a);});
  const today=new Date();
  const fmt=d=>`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  let cells='';
  for(let i=0;i<start;i++)cells+='<div></div>';
  for(let d=1;d<=days;d++){
    const key=fmt(d),has=aMap[key]||[],isT=d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear(),isSel=calSel===d;
    cells+=`<div class="cell${isT?' today':''}${isSel?' sel':''}" onclick="calSel=${isSel?'null':d};render()">
      <div class="cnum">${d}</div>
      <div class="cdots">${has.slice(0,4).map(a=>`<div class="cdot" style="background:${caseColor(a.caseId)}"></div>`).join('')}</div>
    </div>`;
  }
  let selDetail='';
  if(calSel){
    const key=fmt(calSel),dA=aMap[key]||[];
    selDetail=`<div class="card" style="margin-top:12px">
      <div class="stitle">📋 ${calMonth+1}月${calSel}日</div>
      ${dA.length===0?'<div style="color:var(--muted);font-size:13px">當天沒有預約</div>':dA.map(a=>`
      <div class="card-row">
        <div class="av" style="width:32px;height:32px;background:${caseColor(a.caseId)};font-size:12px">${caseName(a.caseId)[0]||'?'}</div>
        <div style="flex:1"><div style="font-weight:600;font-size:13px">${caseName(a.caseId)} · ${a.time}</div>
        <div style="font-size:11px;color:var(--muted)">${typeLabel(a.type,a.groupSize)} · ${a.note||'–'}</div></div>
        <div style="text-align:right"><div style="font-weight:700;color:var(--sage-d);font-size:13px">$${a.fee}</div>
        <span class="tag" style="font-size:10px;background:${a.status==='done'?'var(--sage-l)':'var(--peach-l)'};color:${a.status==='done'?'var(--sage-d)':'var(--peach)'}">${a.status==='done'?'已完成':'預約中'}</span></div>
      </div>`).join('')}
    </div>`;
  }
  return`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div class="ptitle" style="margin-bottom:0">行事曆</div>
    <button class="btn btn-peach btn-sm" onclick="openApptModal()">+ 新增預約</button>
  </div>
  <div class="card">
    <div class="cal-hd">
      <button class="cal-nav" onclick="calYear=${calMonth===0?calYear-1:calYear};calMonth=${calMonth===0?11:calMonth-1};calSel=null;render()">‹</button>
      <div class="cal-title">${calYear} · ${MONTHS[calMonth]}</div>
      <button class="cal-nav" onclick="calYear=${calMonth===11?calYear+1:calYear};calMonth=${calMonth===11?0:calMonth+1};calSel=null;render()">›</button>
    </div>
    <div class="cal-grid">${DAYS.map(d=>`<div class="cdn">${d}</div>`).join('')}${cells}</div>
  </div>${selDetail}`;
}

// ══════════════════════════════════════════════════
// INCOME
// ══════════════════════════════════════════════════
function renderIncome(){
  const mA=DB.appts.filter(a=>{const d=new Date(a.date);return d.getFullYear()===incomeYear&&d.getMonth()===incomeMonth;});
  const done=mA.filter(a=>a.status==='done');
  const indDone=done.filter(a=>a.type==='individual');
  const grpDone=done.filter(a=>a.type==='group');
  const totalDone=done.reduce((s,a)=>s+a.fee,0);
  const totalUp=mA.filter(a=>a.status==='upcoming').reduce((s,a)=>s+a.fee,0);
  const monthly=Array.from({length:12},(_,m)=>{const ma=DB.appts.filter(a=>{const d=new Date(a.date);return d.getFullYear()===incomeYear&&d.getMonth()===m&&a.status==='done';});return ma.reduce((s,a)=>s+a.fee,0);});
  const maxM=Math.max(...monthly,1);
  const byCase=DB.cases.map(c=>{const ca=done.filter(a=>a.caseId===c.id);return{...c,count:ca.length,income:ca.reduce((s,a)=>s+a.fee,0)};}).filter(c=>c.income>0).sort((a,b)=>b.income-a.income);
  const opts=Array.from({length:12},(_,m)=>`<option value="${incomeYear}-${m}"${incomeMonth===m?' selected':''}>${incomeYear}年 ${MONTHS[m]}</option>`).join('');
  return`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div class="ptitle" style="margin-bottom:0">收入管理</div>
    <select class="fsel" style="width:auto;font-size:12px;padding:7px 10px" onchange="const[y,m]=this.value.split('-');incomeYear=+y;incomeMonth=+m;render()">${opts}</select>
  </div>
  <div class="stat-grid">
    <div class="stat" style="background:var(--sage-l)"><div class="stat-ic">✅</div><div class="stat-v" style="color:var(--sage-d);font-size:17px">$${totalDone.toLocaleString()}</div><div class="stat-l">已完成收入</div></div>
    <div class="stat" style="background:var(--gold-l)"><div class="stat-ic">⏳</div><div class="stat-v" style="color:var(--gold);font-size:17px">$${totalUp.toLocaleString()}</div><div class="stat-l">預計收入</div></div>
    <div class="stat" style="background:#EBF0FC"><div class="stat-ic">👤</div><div class="stat-v" style="color:#5B78C9">${indDone.length}<span style="font-size:12px;font-weight:400;margin-left:2px">次</span></div><div class="stat-l">個別課</div></div>
    <div class="stat" style="background:var(--lav-l)"><div class="stat-ic">👥</div><div class="stat-v" style="color:var(--lav)">${grpDone.length}<span style="font-size:12px;font-weight:400;margin-left:2px">次</span></div><div class="stat-l">團體課</div></div>
  </div>
  <div class="card">
    <div class="stitle">📈 ${incomeYear} 年月收入</div>
    <div class="inc-bars">${monthly.map((v,i)=>`<div class="ib-wrap">

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
window.addEventListener('click',e=>{document.querySelectorAll('.overlay.open').forEach(o=>{if(e.target===o)o.classList.remove('open');});});

// Swipe down to close modal
(function(){
  let startY=0,startX=0;
  document.addEventListener('touchstart',e=>{
    const sheet=e.target.closest('.sheet');
    if(sheet){startY=e.touches[0].clientY;startX=e.touches[0].clientX;}
  },{passive:true});
  document.addEventListener('touchend',e=>{
    const sheet=e.target.closest('.sheet');
    if(!sheet)return;
    const dy=e.changedTouches[0].clientY-startY;
    const dx=Math.abs(e.changedTouches[0].clientX-startX);
    if(dy>80&&dx<40){
      const overlay=sheet.closest('.overlay');
      if(overlay)overlay.classList.remove('open');
    }
  },{passive:true});
})();

const SCORE_LEVELS = {
  standard: [
    {min:130,label:'非常優秀',color:'#2E7D32'},{min:115,label:'優秀',color:'#4CAF50'},
    {min:85,label:'正常',color:'#8BC34A'},{min:70,label:'邊緣',color:'#FF9800'},
    {min:0,label:'落後',color:'#E07070'}
  ],
  percentile: [
    {min:84,label:'正常偏上',color:'#4CAF50'},{min:16,label:'正常範圍',color:'#8BC34A'},
    {min:5,label:'邊緣',color:'#FF9800'},{min:0,label:'顯著落後',color:'#E07070'}
  ]
};

function getScoreLevel(score,type='standard'){
  const levels=SCORE_LEVELS[type]||SCORE_LEVELS.standard;
  for(const l of levels){if(score>=l.min)return l;}
  return levels[levels.length-1];
}

function renderAssessContent(){
  const toolKey=document.getElementById('asf-tool')?.value||'PDMS-2';
  const tool=ASSESS_TOOLS[toolKey];
  const subtoolDef=ASSESS_SUBTESTS[toolKey];
  const prev=window._assessEdit||{};
  const scores=toolKey===prev.toolKey?prev.scores:{};
  const pcts=toolKey===prev.toolKey?prev.pcts:{};
  const subR=toolKey===prev.toolKey?prev.subtestResults:{};
  const wrap=document.getElementById('assess-content-wrap');if(!wrap)return;

  const scoreTypeLabels={'0-1':'0=未通過 / 1=通過','0-2':'0=無法 / 1=嘗試 / 2=完成','0-4':'0-4分','0-1-2':'0=從不 / 1=有時 / 2=總是','never-always':'1=從不 / 2=偶爾 / 3=常常 / 4=總是'};

  let html=`<div style="background:var(--teal-l);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--teal)">`;
  html+=`📋 ${tool.name} · 適用年齡：${tool.ageRange}</div>`;

  // Subtests checklist
  if(subtoolDef?.subtests){
    html+=`<div class="fg"><label class="fl">分測驗項目</label>`;
    html+=`<div style="background:var(--bg);border-radius:10px;padding:12px;margin-bottom:8px">`;
    subtoolDef.subtests.forEach((st,i)=>{
      const scoreType=scoreTypeLabels[st.score]||st.score;
      html+=`<div style="padding:8px 0;border-bottom:1px solid var(--border)">`;
      html+=`<div style="font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px">${st.name}</div>`;
      html+=`<div style="font-size:10px;color:var(--muted);margin-bottom:6px">${scoreType}</div>`;
      // Score buttons
      if(st.score==='0-1'){
        html+=`<div style="display:flex;gap:6px">`;
        ['0-未通過','1-通過'].forEach(opt=>{
          const val=opt.split('-')[0];
          const isSelected=subR[st.name]===val;
          html+=`<button onclick="setSubtest('${st.name}','${val}')" style="padding:5px 14px;border-radius:20px;border:1px solid ${isSelected?'var(--sage-d)':'var(--border)'};background:${isSelected?'var(--sage-d)':'transparent'};color:${isSelected?'#fff':'var(--navy)'};font-size:12px;font-weight:600;cursor:pointer">${opt}</button>`;
        });
        html+=`</div>`;
      } else if(st.score==='0-2'){
        html+=`<div style="display:flex;gap:6px;flex-wrap:wrap">`;
        ['0-無法','1-嘗試','2-完成'].forEach(opt=>{
          const val=opt.split('-')[0];
          const isSelected=subR[st.name]===val;
          html+=`<button onclick="setSubtest('${st.name}','${val}')" style="padding:5px 12px;border-radius:20px;border:1px solid ${isSelected?'var(--sage-d)':'var(--border)'};background:${isSelected?'var(--sage-d)':'transparent'};color:${isSelected?'#fff':'var(--navy)'};font-size:12px;font-weight:600;cursor:pointer">${opt}</button>`;
        });
        html+=`</div>`;
      } else if(st.score==='never-always'){
        html+=`<div style="display:flex;gap:4px;flex-wrap:wrap">`;
        ['1-從不','2-偶爾','3-常常','4-總是'].forEach(opt=>{
          const val=opt.split('-')[0];
          const isSelected=subR[st.name]===val;
          html+=`<button onclick="setSubtest('${st.name}','${val}')" style="padding:5px 10px;border-radius:20px;border:1px solid ${isSelected?'var(--lav)':'var(--border)'};background:${isSelected?'var(--lav)':'transparent'};color:${isSelected?'#fff':'var(--navy)'};font-size:11px;font-weight:600;cursor:pointer">${opt}</button>`;
        });
        html+=`</div>`;
      }
      html+=`</div>`;
    });
    html+=`</div></div>`;
  }

  // Composite / summary scores
  const compList=subtoolDef?.composites||subtoolDef?.quadrants||[];
  if(compList.length){
    html+=`<div class="fg"><label class="fl">合成分數／等級</label>`;
    compList.forEach(comp=>{
      const sv=scores[comp.name]||'';
      const pv=pcts[comp.name]||'';
      const level=sv?getScoreLevel(+sv,'standard'):null;
      html+=`<div style="background:var(--bg);border-radius:10px;padding:10px 12px;margin-bottom:8px">`;
      html+=`<div style="font-size:13px;font-weight:600;margin-bottom:8px">${comp.name}</div>`;
      html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">`;
      html+=`<div><div style="font-size:10px;color:var(--muted);margin-bottom:3px">標準分數</div><input class="fi" type="number" id="sc-${comp.name}" placeholder="–" value="${sv}" oninput="updateScoreLevel('${comp.name}')"></div>`;
      if(tool.hasPercentile){
        html+=`<div><div style="font-size:10px;color:var(--muted);margin-bottom:3px">百分位</div><input class="fi" type="number" id="pc-${comp.name}" placeholder="–" value="${pv}"></div>`;
      }
      html+=`</div>`;
      if(level){html+=`<div id="level-${comp.name}" style="margin-top:6px;display:inline-block;padding:3px 10px;border-radius:20px;background:${level.color}22;color:${level.color};font-size:12px;font-weight:700">${level.label}</div>`;}
      else{html+=`<div id="level-${comp.name}"></div>`;}
      html+=`</div>`;
    });
    html+=`</div>`;
  }

  wrap.innerHTML=html;
}

function setSubtest(name,val){
  if(!window._assessEdit.subtestResults)window._assessEdit.subtestResults={};
  window._assessEdit.subtestResults[name]=val;
  // Re-render to update button states
  renderAssessContent();
}

function updateScoreLevel(compName){
  const val=+document.getElementById('sc-'+compName)?.value;
  const levelEl=document.getElementById('level-'+compName);
  if(!levelEl)return;
  if(!val){levelEl.innerHTML='';return;}
  const level=getScoreLevel(val,'standard');
  levelEl.style.cssText=`margin-top:6px;display:inline-block;padding:3px 10px;border-radius:20px;background:${level.color}22;color:${level.color};font-size:12px;font-weight:700`;
  levelEl.textContent=level.label;
}

function renderAssessScores(){
  const toolKey=document.getElementById('asf-tool')?.value||'PDMS-2';
  const tool=ASSESS_TOOLS[toolKey];
  const prev=window._assessEdit||{};
  const s=toolKey===prev.toolKey?prev.scores:{};

    </div>`).join('')}

async function submitAssess(editId){
  const toolKey=document.getElementById('asf-tool').value;
  const tool=ASSESS_TOOLS[toolKey];
  const subtoolDef=ASSESS_SUBTESTS[toolKey];
  const scores={},pcts={};
  // collect composite scores
  const compList=(subtoolDef?.composites||subtoolDef?.quadrants||[]);
  compList.forEach(comp=>{
    const sv=document.getElementById('sc-'+comp.name)?.value;if(sv)scores[comp.name]=sv;
    if(tool.hasPercentile){const pv=document.getElementById('pc-'+comp.name)?.value;if(pv)pcts[comp.name]=pv;}
  });
  // also collect from old score fields if any
  (tool.scores||[]).forEach(name=>{
    const sv=document.getElementById(`sc-${name}`)?.value;if(sv)scores[name]=sv;
    if(tool.hasPercentile){const pv=document.getElementById(`pc-${name}`)?.value;if(pv)pcts[name]=pv;}
  });
  const subtestResults=window._assessEdit?.subtestResults||{};
  const data={id:editId||newId(),caseId:currentCase.id,tool:toolKey,date:document.getElementById('asf-date').value,scores:JSON.stringify(scores),percentiles:JSON.stringify(pcts),subtestResults:JSON.stringify(subtestResults),notes:document.getElementById('asf-notes').value,recommendations:document.getElementById('asf-rec').value};
  if(editId){const idx=DB.assessments.findIndex(a=>a.id===editId);DB.assessments[idx]=data;}
  else DB.assessments.push(data);
  closeModal('modal-assess');toast('💾 儲存中…');await saveAll('assess')();toast('✅ 評估已儲存');render();
}

function setMilestone(prefix,i,val){

    const el=document.getElementById(`${prefix}-${i}-${v}`);

async function submitMilestone(ageGrp){
  const toObj=prefix=>{
    const ms=MILESTONES[ageGrp];
    const areaMap={gross:'mf-gross',fine:'mf-fine',cognitive:'mf-cog',social:'mf-social',selfcare:'mf-sc'};
    const data={};
    Object.entries(areaMap).forEach(([area,p])=>{
      const items=ms[area]||[];
      items.forEach((item,i)=>{data[item]=window._msData[p]?.[i]||'na';});
    });
    return data;
  };
  const data={id:newId(),caseId:currentCase.id,date:document.getElementById('mf-date').value,ageGroup:ageGrp,
    gross:JSON.stringify(toObj('mf-gross')||{}),fine:JSON.stringify(toObj('mf-fine')||{}),
    cognitive:JSON.stringify(toObj('mf-cog')||{}),social:JSON.stringify(toObj('mf-social')||{}),
    selfcare:JSON.stringify(toObj('mf-sc')||{}),notes:document.getElementById('mf-notes').value};
  DB.milestones.push(data);window._msData={};
  closeModal('modal-milestone');toast('💾 儲存中…');await saveAll('milestones')();toast('✅ 里程碑已儲存');render();
}

  const areas=[['粗大動作',parse(m.gross)],['精細動作',parse(m.fine)],['認知發展',parse(m.cognitive)],['社交情緒',parse(m.social)],['生活自理',parse(m.selfcare)]];
  document.getElementById('mm-title').textContent=`里程碑紀錄 · ${m.date}`;
  document.getElementById('mm-body').innerHTML=`
  <div style="font-size:12px;color:var(--muted);margin-bottom:14px">${ag.title||m.ageGroup}</div>
  ${areas.map(([title,obj])=>`
    <div class="milestone-section">
      <div class="milestone-title">${title}</div>
      ${Object.entries(obj).map(([item,val])=>`
      <div class="milestone-item">
        <div style="flex:1;font-size:13px">${item}</div>
        <span class="tag" style="background:${val==='yes'?'var(--sage-l)':val==='no'?'var(--red-l)':'var(--border)'};color:${val==='yes'?'var(--sage-d)':val==='no'?'var(--red)':'var(--muted)'}">${val==='yes'?'✓ 達到':val==='no'?'✗ 未達':'– 未測'}</span>

    </div>`).join('')}
  ${m.notes?`<div class="card" style="margin-top:10px;font-size:13px">${m.notes}</div>`:''}
  <button class="btn btn-red btn-full" style="margin-top:12px" onclick="deleteMilestone('${id}')">🗑 刪除此紀錄</button>`;
  openModal('modal-milestone');
}

async function deleteMilestone(id){if(!confirm('確定刪除？'))return;DB.milestones=DB.milestones.filter(m=>m.id!==id);closeModal('modal-milestone');toast('🗑 刪除中…');await saveAll('milestones')();toast('✅ 已刪除');render();}

// ══════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════
async function boot(){
  try{
    document.querySelector('#loading p').textContent='驗證 Google 連線中…';
    const token = await getAccessToken();
    document.querySelector('#loading p').textContent='讀取資料中…';
    await initSheets();
    await loadAll();
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='flex';
    render();
  }catch(e){
    const msg = e?.message||String(e);
    document.getElementById('loading').innerHTML=`
    <div style="text-align:center;padding:30px">
      <div style="font-size:36px;margin-bottom:12px">❌</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:8px">連線失敗</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px;word-break:break-all;background:#f5f5f5;padding:10px;border-radius:8px;text-align:left">${msg}</div>
      <button onclick="location.reload()" style="background:var(--sage-d);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:14px;cursor:pointer">重新載入</button>
    </div>`;
    console.error(e);
  }
}
boot();
</script>
